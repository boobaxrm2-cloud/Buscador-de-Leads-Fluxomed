<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Sorteio do Café - Fluxomed ☕</title>
<style>
    body {
        margin: 0;
        font-family: 'Segoe UI', sans-serif;
        background: linear-gradient(135deg, #4b2e2e, #8b5e3c);
        color: white;
        text-align: center;
    }

    h1 {
        margin-top: 20px;
        font-size: 2.5em;
    }

    .container {
        margin-top: 20px;
    }

    canvas {
        background: #fff;
        border-radius: 50%;
        box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    button {
        margin-top: 20px;
        padding: 15px 30px;
        font-size: 18px;
        border: none;
        border-radius: 10px;
        background: #d2691e;
        color: white;
        cursor: pointer;
        transition: 0.3s;
    }

    button:hover {
        background: #a0522d;
    }

    #winner {
        position: fixed;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%) scale(0);
        font-size: 50px;
        font-weight: bold;
        color: #fff;
        background: rgba(0,0,0,0.8);
        padding: 30px;
        border-radius: 20px;
        transition: 0.5s;
        z-index: 10;
    }

    #winner.show {
        transform: translate(-50%, -50%) scale(1);
    }

    .coffee {
        font-size: 40px;
    }

    .confetti {
        position: fixed;
        width: 10px;
        height: 10px;
        background: gold;
        top: 0;
        animation: fall 3s linear infinite;
    }

    @keyframes fall {
        to {
            transform: translateY(100vh) rotate(360deg);
        }
    }
</style>
</head>
<body>

<h1>☕ Sorteio do Café - Fluxomed ☕</h1>

<div class="container">
    <canvas id="wheel" width="400" height="400"></canvas><br>
    <button onclick="spin()">Girar a Roda</button>
</div>

<div id="winner"></div>

<script>
const names = [
"Jonas","Mariana","Nayara","Joyce F","Laiz","Romerito",
"Mauro","Arthur","Bruna","Ediel","Thiago","Alessandra","Eduardo"
];

const canvas = document.getElementById("wheel");
const ctx = canvas.getContext("2d");

const colors = ["#6f4e37","#c19a6b","#8b4513","#d2b48c","#a0522d"];
let startAngle = 0;

function drawWheel() {
    const arc = Math.PI * 2 / names.length;

    for(let i = 0; i < names.length; i++) {
        const angle = startAngle + i * arc;
        ctx.fillStyle = colors[i % colors.length];

        ctx.beginPath();
        ctx.moveTo(200,200);
        ctx.arc(200,200,200,angle,angle+arc);
        ctx.fill();

        ctx.save();
        ctx.fillStyle = "#fff";
        ctx.translate(200,200);
        ctx.rotate(angle + arc/2);
        ctx.fillText(names[i], 100, 5);
        ctx.restore();
    }
}

function spin() {
    let spinAngle = Math.random() * 2000 + 2000;
    let duration = 4000;
    let start = null;

    function animate(timestamp) {
        if (!start) start = timestamp;
        let progress = timestamp - start;

        let angle = easeOut(progress, 0, spinAngle, duration);
        startAngle = angle * Math.PI / 180;

        ctx.clearRect(0,0,400,400);
        drawWheel();

        if (progress < duration) {
            requestAnimationFrame(animate);
        } else {
            showWinner();
        }
    }

    requestAnimationFrame(animate);
}

function easeOut(t, b, c, d) {
    t /= d;
    t--;
    return c*(t*t*t + 1) + b;
}

function showWinner() {
    const index = Math.floor(names.length - (startAngle / (Math.PI*2)) * names.length) % names.length;
    const winnerName = names[(index + names.length) % names.length];

    const winnerDiv = document.getElementById("winner");
    winnerDiv.innerHTML = "☕ " + winnerName + " ☕";
    winnerDiv.classList.add("show");

    launchConfetti();

    setTimeout(() => {
        winnerDiv.classList.remove("show");
    }, 4000);
}

function launchConfetti() {
    for(let i=0;i<100;i++){
        let div = document.createElement("div");
        div.classList.add("confetti");
        div.style.left = Math.random() * 100 + "vw";
        div.style.background = ["#fff","#ffd700","#ff6347","#8b4513"][Math.floor(Math.random()*4)];
        div.style.animationDuration = (Math.random()*3+2)+"s";
        document.body.appendChild(div);

        setTimeout(()=>div.remove(),5000);
    }
}

drawWheel();
</script>

</body>
</html>
