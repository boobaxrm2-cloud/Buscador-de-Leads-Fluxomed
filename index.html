<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>LinguaPro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 font-sans">

<!-- Sidebar -->
<div class="flex h-screen">
  <aside class="w-64 bg-white shadow-lg p-5">
    <h1 class="text-2xl font-bold mb-10 text-blue-600">LinguaPro</h1>
    <nav class="space-y-4">
      <button onclick="showSection('agenda')" class="block w-full text-left p-2 rounded hover:bg-blue-100">📅 Agenda</button>
      <button onclick="showSection('materiais')" class="block w-full text-left p-2 rounded hover:bg-blue-100">📂 Materiais</button>
      <button onclick="showSection('forum')" class="block w-full text-left p-2 rounded hover:bg-blue-100">💬 Fórum</button>
    </nav>
  </aside>

  <!-- Main Content -->
  <main class="flex-1 p-8 overflow-y-auto">

    <!-- Agenda -->
    <section id="agenda" class="section">
      <h2 class="text-3xl font-bold mb-6">Agenda de Aulas</h2>
      <div class="grid md:grid-cols-2 gap-6">
        <div class="bg-white p-5 rounded-2xl shadow">
          <h3 class="font-semibold">Inglês</h3>
          <p>22/04 - 19h</p>
        </div>
        <div class="bg-white p-5 rounded-2xl shadow">
          <h3 class="font-semibold">Espanhol</h3>
          <p>24/04 - 18h</p>
        </div>
      </div>
    </section>

    <!-- Materiais -->
    <section id="materiais" class="section hidden">
      <h2 class="text-3xl font-bold mb-6">Materiais</h2>
      <div class="space-y-4">
        <div class="bg-white p-5 rounded-2xl shadow flex justify-between">
          <span>Aula 1 - PDF</span>
          <button onclick="downloadFile('Aula 1')" class="bg-blue-500 text-white px-4 py-2 rounded">Download</button>
        </div>
        <div class="bg-white p-5 rounded-2xl shadow flex justify-between">
          <span>Aula 2 - PDF</span>
          <button onclick="downloadFile('Aula 2')" class="bg-blue-500 text-white px-4 py-2 rounded">Download</button>
        </div>
      </div>
    </section>

    <!-- Fórum -->
    <section id="forum" class="section hidden">
      <h2 class="text-3xl font-bold mb-6">Fórum</h2>

      <div class="bg-white p-5 rounded-2xl shadow mb-6">
        <input id="postTitle" placeholder="Título" class="w-full p-3 border rounded mb-2" />
        <textarea id="postContent" placeholder="Sua dúvida..." class="w-full p-3 border rounded mb-2"></textarea>
        <button onclick="addPost()" class="bg-blue-600 text-white px-4 py-2 rounded">Publicar</button>
      </div>

      <div id="posts" class="space-y-4"></div>
    </section>

  </main>
</div>

<script>
function showSection(id) {
  document.querySelectorAll('.section').forEach(sec => sec.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');
}

function downloadFile(name) {
  alert('Baixando ' + name);
}

function addPost() {
  const title = document.getElementById('postTitle').value;
  const content = document.getElementById('postContent').value;

  if (!title || !content) return alert('Preencha tudo');

  const post = document.createElement('div');
  post.className = 'bg-white p-5 rounded-2xl shadow';
  post.innerHTML = `<h3 class='font-bold'>${title}</h3><p>${content}</p>`;

  document.getElementById('posts').prepend(post);

  document.getElementById('postTitle').value = '';
  document.getElementById('postContent').value = '';
}
</script>

</body>
</html>
