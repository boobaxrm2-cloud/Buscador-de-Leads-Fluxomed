<!DOCTYPE html>
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    input, textarea {
      width: 100%;
      padding: 10px;
      margin: 5px 0;
    }
  </style>
</head>
<body>

<header>
  <h1>Plataforma de Idiomas</h1>
</header>

<nav>
  <button onclick="showSection('agenda')">Agenda</button>
  <button onclick="showSection('materiais')">Materiais</button>
  <button onclick="showSection('forum')">Fórum</button>
</nav>

<div id="agenda" class="section active">
  <h2>Agenda de Aulas</h2>
  <div class="card">📅 Aula de Inglês - 22/04 às 19h</div>
  <div class="card">📅 Aula de Espanhol - 24/04 às 18h</div>
</div>

<div id="materiais" class="section">
  <h2>Materiais para Download</h2>
  <div class="card">
    📄 Aula 1 - PDF
    <button onclick="downloadFile('Aula 1')">Download</button>
  </div>
  <div class="card">
    📄 Aula 2 - PDF
    <button onclick="downloadFile('Aula 2')">Download</button>
  </div>
</div>

<div id="forum" class="section">
  <h2>Fórum de Ajuda</h2>
  <input id="postTitle" placeholder="Título da dúvida">
  <textarea id="postContent" placeholder="Descreva sua dúvida"></textarea>
  <button onclick="addPost()">Publicar</button>

  <div id="posts"></div>
</div>

<script>
function showSection(sectionId) {
  document.querySelectorAll('.section').forEach(sec => {
    sec.classList.remove('active');
  });
  document.getElementById(sectionId).classList.add('active');
}

function downloadFile(fileName) {
  alert('Baixando ' + fileName);
}

function addPost() {
  const title = document.getElementById('postTitle').value;
  const content = document.getElementById('postContent').value;

  if (!title || !content) {
    alert('Preencha todos os campos');
    return;
  }

  const postDiv = document.createElement('div');
  postDiv.className = 'card';
  postDiv.innerHTML = `<strong>${title}</strong><p>${content}</p>`;

  document.getElementById('posts').prepend(postDiv);

  document.getElementById('postTitle').value = '';
  document.getElementById('postContent').value = '';
}
</script>

</body>
</html>
