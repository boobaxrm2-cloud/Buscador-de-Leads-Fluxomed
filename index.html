<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<title>Dashboard Inteligente de Planilhas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>

body{
background:#0f172a;
color:white;
font-family:Arial;
}

.sidebar{
background:#1e293b;
height:100vh;
padding:20px;
position:fixed;
width:300px;
}

.dashboard{
margin-left:320px;
padding:30px;
}

.card{
background:#1e293b;
border:none;
border-radius:12px;
margin-bottom:25px;
}

.chart-container{
height:350px;
}

select,input{
margin-bottom:10px;
}

</style>

</head>

<body>

<div class="sidebar">

<h4>📊 Gerador de Dashboard</h4>

<hr>

<label>Upload da planilha</label>
<input type="file" id="upload" class="form-control">

<hr>

<label>Coluna</label>
<select id="coluna" class="form-select"></select>

<label>Tipo de gráfico</label>
<select id="tipoGrafico" class="form-select">

<option value="bar">Barras</option>
<option value="pie">Pizza</option>
<option value="line">Linha</option>
<option value="doughnut">Donut</option>
<option value="radar">Radar</option>

</select>

<button class="btn btn-primary w-100 mt-2" onclick="adicionarGrafico()">
Adicionar gráfico
</button>

<button class="btn btn-danger w-100 mt-2" onclick="limparDashboard()">
Limpar dashboard
</button>

</div>

<div class="dashboard">

<h2>Dashboard</h2>

<div class="row" id="dashboard"></div>

</div>

<script>

let dadosPlanilha = [];
let graficos = [];
let contador = 0;

document.getElementById("upload").addEventListener("change", carregarArquivo);

function carregarArquivo(e){

const file = e.target.files[0];
const reader = new FileReader();

reader.onload = function(evt){

const data = new Uint8Array(evt.target.result);
const workbook = XLSX.read(data,{type:'array'});

const sheet = workbook.Sheets[workbook.SheetNames[0]];

dadosPlanilha = XLSX.utils.sheet_to_json(sheet);

preencherColunas();

};

reader.readAsArrayBuffer(file);

}

function preencherColunas(){

const colunas = Object.keys(dadosPlanilha[0]);

const select = document.getElementById("coluna");

select.innerHTML="";

colunas.forEach(c=>{

let option = document.createElement("option");
option.value=c;
option.text=c;

select.appendChild(option);

});

}

function adicionarGrafico(){

const coluna = document.getElementById("coluna").value;
const tipo = document.getElementById("tipoGrafico").value;

let contagem = {};

dadosPlanilha.forEach(d=>{

let valor = d[coluna];

if(!contagem[valor]) contagem[valor]=0;

contagem[valor]++;

});

const labels = Object.keys(contagem);
const valores = Object.values(contagem);

contador++;

const id = "grafico"+contador;

const html = `
<div class="col-md-6">
<div class="card p-3">

<h5>${coluna}</h5>

<div class="chart-container">
<canvas id="${id}"></canvas>
</div>

</div>
</div>
`;

document.getElementById("dashboard").innerHTML += html;

const ctx = document.getElementById(id);

const grafico = new Chart(ctx,{
type:tipo,
data:{
labels:labels,
datasets:[{
label:coluna,
data:valores
}]
},
options:{
responsive:true,
maintainAspectRatio:false
}
});

graficos.push(grafico);

}

function limparDashboard(){

document.getElementById("dashboard").innerHTML="";

graficos.forEach(g=>g.destroy());

graficos=[];

}

</script>

</body>
</html>
